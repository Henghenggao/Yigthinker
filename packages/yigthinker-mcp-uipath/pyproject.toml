[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "yigthinker-mcp-uipath"
version = "0.1.0"
description = "MCP server exposing UiPath Orchestrator tools to Yigthinker"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.13.0,<2",
    "httpx>=0.27.0,<1",
    "pydantic>=2.0.0,<3",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.22.0,<1",
]

[project.scripts]
yigthinker-mcp-uipath = "yigthinker_mcp_uipath.__main__:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
