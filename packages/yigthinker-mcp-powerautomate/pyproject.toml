[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "yigthinker-mcp-powerautomate"
version = "0.1.0a1"
description = "MCP server exposing Microsoft Power Automate Flow Management as 5 tools for Yigthinker and any other MCP-compatible LLM agent"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Henghenggao" },
]
keywords = [
    "mcp", "power-automate", "microsoft-flow", "rpa",
    "flow-management", "azure-ad", "msal", "llm-agent", "yigthinker",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
    "Typing :: Typed",
]
dependencies = [
    "mcp>=1.13.0,<2",
    "httpx>=0.27.0,<1",
    "pydantic>=2.0.0,<3",
    "msal>=1.23.0,<2",
]

[project.urls]
Homepage = "https://github.com/Henghenggao/Yigthinker"
Repository = "https://github.com/Henghenggao/Yigthinker"
Issues = "https://github.com/Henghenggao/Yigthinker/issues"

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-timeout>=2.3.0",
    "respx>=0.22.0,<1",
]

[project.scripts]
yigthinker-mcp-powerautomate = "yigthinker_mcp_powerautomate.__main__:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
timeout = 60
timeout_method = "thread"
