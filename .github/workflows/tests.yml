name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # Hard cap so a hung test never burns the 6-hour GitHub default.
    # The three test-running steps below each run to ~10-15 min max; 25 gives headroom.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python scripts/run_all_tests.py --install-only

      # Split the three suites so a hang is attributed to a specific step,
      # and so a failure in one suite still produces logs for the others.
      - name: Run root test suite
        run: python -m pytest -q
        timeout-minutes: 10

      - name: Run yigthinker-mcp-uipath tests
        run: python -m pytest -q
        working-directory: packages/yigthinker-mcp-uipath
        timeout-minutes: 5

      - name: Run yigthinker-mcp-powerautomate tests
        run: python -m pytest -q
        working-directory: packages/yigthinker-mcp-powerautomate
        timeout-minutes: 5
