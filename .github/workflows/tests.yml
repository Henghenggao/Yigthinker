name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packages/yigthinker-mcp-uipath/pyproject.toml
            packages/yigthinker-mcp-powerautomate/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install -e ".[test]" -e "packages/yigthinker-mcp-uipath[test]" -e "packages/yigthinker-mcp-powerautomate[test]"

      - name: Run all test suites
        run: python -u scripts/run_all_tests.py --skip-install
